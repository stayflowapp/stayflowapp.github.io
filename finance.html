<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Finance - StayFlow</title><link rel="stylesheet" href="css/styles.css"/></head><body><div class="app-shell"><header class="hero"><div class="brand-row"><div class="logo-badge"></div><div><div class="brand-title">StayFlow<span class="tm">™</span></div><div class="tagline">Run Your Property Smoothly</div></div></div></header><main class="section stack"><section class="card"><div class="eyebrow">Daily expenses</div><div class="property">Expenses and reconciliation</div><div class="sub">Add daily expenses, then view gross, expenses, net, and outstanding for any exact date.</div><form id="expenseForm" class="form-grid"><label><span>Expense item</span><input type="text" id="expenseItem" placeholder="Cleaning supplies" required/></label><label><span>Amount</span><input type="number" id="expenseAmount" min="0" step="0.01" required/></label><label><span>Date</span><input type="date" id="expenseDate" required/></label><div class="form-actions full-span"><button class="btn primary" type="submit">Add expense</button></div></form></section><section class="card"><div class="eyebrow">Owner report</div><label><span>Report date</span><input type="date" id="reportDate" /></label><div class="actions"><button class="btn primary" id="viewReportBtn">View report</button><button class="btn" id="generateReportBtn">Generate report</button></div><div class="grid"><div class="metric"><div class="label">Gross</div><div class="value" id="grossValue">0</div></div><div class="metric"><div class="label">Expenses</div><div class="value" id="expenseValue">0</div></div><div class="metric"><div class="label">Net</div><div class="value" id="netValue">0</div></div><div class="metric"><div class="label">Outstanding</div><div class="value" id="outstandingValue">0</div></div></div><div class="top-gap"><div class="eyebrow" style="margin-top:14px">Expense entries</div><div id="expenseRows"></div></div><div id="reportNote" class="sub top-gap"></div></section></main><nav class="footer-nav"><a class="nav-item" href="index.html">Home</a><a class="nav-item" href="bookings.html">Bookings</a><a class="nav-item" href="rooms.html">Rooms</a><a class="nav-item active" href="finance.html">Finance</a><a class="nav-item" href="more.html">More</a></nav></div><script src="js/common.js"></script><script>document.querySelector('.logo-badge').innerHTML=logoSvg(); let state=ensurePropertyDefaults(getState()); applyTheme(state.theme||'dark'); const reportDate=document.getElementById('reportDate'); const expenseDate=document.getElementById('expenseDate'); reportDate.value=isoToday(); expenseDate.value=isoToday(); const currency=(state.property&&state.property.currency)||'TZS'; function render(date){ const totals=ownerTotals(state,date); document.getElementById('grossValue').textContent=money(totals.gross,currency); document.getElementById('expenseValue').textContent=money(totals.expenses,currency); document.getElementById('netValue').textContent=money(totals.net,currency); document.getElementById('outstandingValue').textContent=money(totals.outstanding,currency); const rows=expensesByDate(state,date); document.getElementById('expenseRows').innerHTML=rows.length?rows.map(x=>`<div class="row"><div><strong>${x.item}</strong><span>${x.date}</span></div><div class="badge clean">${money(x.amount,currency)}</div></div>`).join(''):'<div class="sub">No expenses recorded for this date.</div>'; document.getElementById('reportNote').textContent=`Report date: ${date} • Gross - Expenses = Net`; } document.getElementById('expenseForm').addEventListener('submit',e=>{ e.preventDefault(); state.expenses=state.expenses||[]; state.expenses.unshift({item:document.getElementById('expenseItem').value,amount:Number(document.getElementById('expenseAmount').value||0),date:document.getElementById('expenseDate').value||isoToday()}); saveState(state); e.target.reset(); expenseDate.value=isoToday(); render(reportDate.value||isoToday()); }); document.getElementById('viewReportBtn').addEventListener('click',()=>render(reportDate.value||isoToday())); document.getElementById('generateReportBtn').addEventListener('click',()=>render(reportDate.value||isoToday())); render(isoToday());</script></body></html>
